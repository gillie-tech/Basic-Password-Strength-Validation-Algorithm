<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Validator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h2>Set your password</h2>
    <p class="subtitle">Choose a strong, unpredictable password.</p>
    
    <div class="input-group">
      <input type="password" id="password" placeholder="Enter password" autocomplete="off">
      <button id="toggle-visibility" type="button" aria-label="Toggle visibility">
        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </div>

    <div class="strength-meter">
      <div class="bar" id="bar-1"></div>
      <div class="bar" id="bar-2"></div>
      <div class="bar" id="bar-3"></div>
      <div class="bar" id="bar-4"></div>
    </div>

    <div class="feedback-container">
      <p id="strength-text" class="strength-text" style="color: #94a3b8;">Welcome</p>
      <ul id="feedback-list">
        <li>Enter a password to see its strength.</li>
      </ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
